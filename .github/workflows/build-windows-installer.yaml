name: Build Flutter Windows Installer

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: flutter
          key: flutter-${{ runner.os }}

      - name: Install Flutter
        shell: pwsh
        run: |
          if (!(Test-Path "flutter")) {
            git clone https://github.com/flutter/flutter.git -b stable
          }
          echo "$PWD/flutter/bin" >> $env:GITHUB_PATH

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Rename EXE
        shell: pwsh
        run: |
          Rename-Item "build\windows\x64\runner\Release\project_changes_generator.exe" "deploy_packager.exe"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer.iss
        shell: pwsh
        run: |
          Set-Content installer.iss "[Setup]"
          Add-Content installer.iss "AppName=deploy_packager"
          Add-Content installer.iss "AppVersion=1.0"
          Add-Content installer.iss "DefaultDirName={pf}\deploy_packager"
          Add-Content installer.iss "DefaultGroupName=deploy_packager"
          Add-Content installer.iss "OutputDir=output"
          Add-Content installer.iss "OutputBaseFilename=deploy_packager_setup"
          Add-Content installer.iss "Compression=lzma"
          Add-Content installer.iss "SolidCompression=yes"
          Add-Content installer.iss ""
          Add-Content installer.iss "[Files]"
          Add-Content installer.iss "Source: ""build\windows\x64\runner\Release\*""; DestDir: ""{app}""; Flags: ignoreversion recursesubdirs"
          Add-Content installer.iss ""
          Add-Content installer.iss "[Icons]"
          Add-Content installer.iss "Name: ""{group}\deploy_packager""; Filename: ""{app}\deploy_packager.exe"""

      - name: Build Installer
        run: iscc installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: deploy-packager-installer
          path: output/deploy_packager_setup.exe